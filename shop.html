<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | NARVEXO OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Poppins:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff5722;
            --dark: #0f0f0f;
            --white: #ffffff;
            --shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8f9fa;
            color: var(--dark); 
        }

        /* --- NAVIGATION FORMAL & LARGE LOGO --- */
        nav { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(15px); 
            padding: 0 6%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: fixed; 
            width: 100%; 
            height: 110px; /* Tinggi ditambah agar logo besar muat */
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        /* Area Kiri: Logo */
        .logo-container {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .logo-container img { 
            height: 80px; /* UKURAN LOGO DIPERBESAR */
            width: auto;
            object-fit: contain;
            mix-blend-mode: multiply; /* Menghilangkan bg putih jika ada */
        }

        /* Area Tengah: Links */
        .nav-links { 
            flex: 2; 
            display: flex; 
            justify-content: center; 
            gap: 45px; 
            list-style: none; 
        }

        .nav-links a { 
            text-decoration: none; 
            color: var(--dark); 
            font-weight: 800; 
            font-size: 15px; 
            letter-spacing: 2px; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* Area Kanan: Cart */
        .cart-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .cart-icon { 
            position: relative; 
            cursor: pointer; 
            font-size: 1.3rem; 
            background: var(--dark); 
            color: white; 
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%; 
            transition: 0.3s; 
        }

        .cart-icon:hover { background: var(--primary); transform: translateY(-3px); }
        .badge { 
            position: absolute; 
            top: -2px; 
            right: -2px; 
            background: var(--primary); 
            color: white; 
            font-size: 11px; 
            padding: 2px 6px; 
            border-radius: 50%; 
            border: 2px solid white; 
            font-weight: 800;
        }

        /* --- SHOP CONTENT --- */
        .shop-header { padding: 180px 5% 40px; text-align: center; }
        .shop-header h1 { font-family: 'Poppins', sans-serif; font-size: 3.5rem; text-transform: uppercase; letter-spacing: -2px; }
        
        .filter-buttons { display: flex; justify-content: center; gap: 12px; margin-top: 30px; }
        .filter-btn { 
            padding: 12px 28px; border: 1px solid #ddd; background: white; 
            border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s;
            text-transform: uppercase; font-size: 12px;
        }
        .filter-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

        .shop-container { 
            padding: 20px 6% 100px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 35px; 
        }
        
        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s; 
        }
        .card:hover { transform: translateY(-10px); }

        .img-container { width: 100%; height: 400px; overflow: hidden; background: #f0f0f0; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 25px; text-align: left; }
        .category-tag { font-size: 11px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-body h3 { font-size: 18px; margin-bottom: 10px; font-weight: 700; }
        .price { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 20px; }
        
        .add-btn { 
            width: 100%; padding: 15px; background: var(--dark); color: white; 
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer; 
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .add-btn:hover { background: var(--primary); }

        /* --- SIDEBAR CART --- */
        .cart-overlay { 
            position: fixed; top: 0; right: -100%; width: 400px; height: 100%; 
            background: white; z-index: 2000; box-shadow: -10px 0 50px rgba(0,0,0,0.15); 
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); padding: 40px; display: flex; flex-direction: column; 
        }
        .cart-overlay.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        #cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        
        .checkout-btn { 
            background: #25D366; color: white; text-align: center; padding: 18px; 
            border-radius: 10px; text-decoration: none; font-weight: 800; display: block; margin-top: 20px;
        }

        footer { padding: 50px; background: var(--dark); color: white; text-align: center; font-size: 13px; letter-spacing: 1px; }

        @media (max-width: 768px) { 
            nav { height: 90px; padding: 0 5%; }
            .nav-links { display: none; }
            .logo-container img { height: 55px; }
            .cart-overlay { width: 100%; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-container">
        <a href="index.html">
            <img src="narvexo.jpeg" alt="NARVEXO LOGO">
        </div>
    </a>

    <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html" class="active">SHOP</a></li>
        <li><a href="contact.html">CONTACT</a></li>
    </ul>

    <div class="cart-container">
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="badge" id="cart-count">0</span>
        </div>
    </div>
</nav>

<header class="shop-header">
    <p data-aos="fade-up" style="color: var(--primary); font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px;">New Season 2026</p>
    <h1 data-aos="fade-up" data-aos-delay="100">CATALOGUE</h1>
    <div class="filter-buttons" data-aos="fade-up" data-aos-delay="200">
        <button class="filter-btn active" onclick="filterProduct('all', this)">All Items</button>
        <button class="filter-btn" onclick="filterProduct('kaos', this)">T-Shirts</button>
        <button class="filter-btn" onclick="filterProduct('hoodie', this)">Hoodies</button>
    </div>
</header>

<div class="shop-container" id="product-grid"></div>

<div class="cart-overlay" id="cart-sidebar">
    <div class="cart-header">
        <h2 style="font-weight: 800; letter-spacing: -1px;">YOUR BAG</h2>
        <i class="fa-solid fa-arrow-right" style="cursor:pointer; font-size: 1.2rem;" onclick="toggleCart()"></i>
    </div>
    <div id="cart-items"></div>
    <div style="padding-top: 20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom: 20px; font-weight: 800; font-size: 1.2rem;">
            <span>Subtotal</span>
            <span id="total-price" style="color: var(--primary);">Rp 0</span>
        </div>
        <a href="javascript:void(0)" class="checkout-btn" onclick="checkoutWA()">
            <i class="fa-brands fa-whatsapp"></i> CHECKOUT TO WHATSAPP
        </a>
    </div>
</div>

<footer>
    <p>&copy; 2026 NARVEXO STORE OFFICIAL. DESIGNED FOR THE NEXT GEN.</p>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ once: true });

    // DATABASE PRODUK
    const products = [
        { id: 1, name: "Nagarawangi Youth", price: 125000, cat: "kaos", img: "Nagarawangi.jpeg" },
        { id: 2, name: "Streetwear Hoodie V.1", price: 250000, cat: "hoodie", img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=600" },
        { id: 4, name: "Oversized White Combed", price: 135000, cat: "kaos", img: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=600" },
        { id: 5, name: "Zipper Jacket Navy", price: 275000, cat: "hoodie", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=600" },
    ];

    let cart = [];

    function renderProducts(filter = 'all') {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);

        filtered.forEach((p, index) => {
            grid.innerHTML += `
                <div class="card" data-aos="fade-up" data-aos-delay="${index * 50}">
                    <div class="img-container"><img src="${p.img}" alt="${p.name}"></div>
                    <div class="card-body">
                        <span class="category-tag">${p.cat}</span>
                        <h3>${p.name}</h3>
                        <div class="price">Rp ${p.price.toLocaleString('id-ID')}</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">ADD TO BAG</button>
                    </div>
                </div>`;
        });
    }

    function filterProduct(category, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts(category);
    }

    function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }

    function addToCart(id) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        updateUI();
        if(!document.getElementById('cart-sidebar').classList.contains('open')) toggleCart();
    }

    function updateUI() {
        const list = document.getElementById('cart-items');
        const count = document.getElementById('cart-count');
        const total = document.getElementById('total-price');
        list.innerHTML = cart.length === 0 ? '<p style="text-align:center;color:#999;margin-top:50px;">Your bag is empty.</p>' : '';
        let totalPrice = 0;
        cart.forEach((item, index) => {
            totalPrice += item.price;
            list.innerHTML += `
                <div class="cart-item">
                    <div><p style="font-weight:700; font-size:14px;">${item.name}</p><small>Rp ${item.price.toLocaleString('id-ID')}</small></div>
                    <i class="fa-solid fa-trash-can" style="color:#ff5252; cursor:pointer;" onclick="removeItem(${index})"></i>
                </div>`;
        });
        count.innerText = cart.length;
        total.innerText = `Rp ${totalPrice.toLocaleString('id-ID')}`;
    }

    function removeItem(index) { cart.splice(index, 1); updateUI(); }

    function checkoutWA() {
        if(cart.length === 0) return alert("Keranjang kosong!");
        const phone = "6287737687886"; // Nomor admin
        let text = "Halo Admin NARVEXO, Saya mau order:%0A%0A";
        cart.forEach((item, i) => { text += `${i+1}. *${item.name}* - Rp ${item.price.toLocaleString('id-ID')}%0A`; });
        text += `%0A*TOTAL HARGA:* ${document.getElementById('total-price').innerText}`;
        window.open(`https://wa.me/${phone}?text=${text}`);
    }

    renderProducts();
</script>
</body>
</html>
