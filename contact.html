<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT US | NARVEXO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Poppins:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff5722; 
            --dark: #0f0f0f; 
            --white: #ffffff; 
            --grey-text: #444;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8f9fa; /* Background disamakan dengan Shop */
            color: var(--dark); 
            overflow-x: hidden; 
        }

        /* --- NAVIGATION FORMAL (IDENTIK DENGAN SHOP/HOME) --- */
        nav { 
            display: flex; 
            align-items: center; 
            position: fixed; 
            width: 100%; 
            height: 110px; 
            padding: 0 5%; 
            top: 0; 
            z-index: 1000; 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(0,0,0,0.06);
            transition: var(--transition);
        }

        /* Area Kiri: Logo */
        .logo-container {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .logo-container img { 
            height: 80px; 
            width: auto;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        /* Area Tengah: Links */
        .nav-center {
            flex: 2; 
            display: flex; 
            justify-content: center; 
        }

        .nav-links { 
            display: flex; 
            gap: 50px; 
            list-style: none; 
        }

        .nav-links a { 
            text-decoration: none; 
            color: var(--dark); 
            font-weight: 800; 
            font-size: 15px; 
            letter-spacing: 2px; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* Area Kanan (Kosongkan/Spacer agar Menu tetap di tengah) */
        .nav-right {
            flex: 1;
        }

        /* --- CONTACT SECTION --- */
        .contact-wrap { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 160px 5% 80px; /* Padding atas disesuaikan tinggi nav */
        }

        .contact-box { 
            width: 100%; 
            max-width: 1100px; 
            display: grid; 
            grid-template-columns: 1fr 1.2fr; 
            background: white; 
            border-radius: 40px; 
            overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        /* Kiri */
        .c-left { 
            background: var(--dark); 
            padding: 60px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }
        .c-left h2 { 
            font-family: 'Poppins', sans-serif; 
            font-size: 3.5rem; 
            line-height: 1; 
            margin-bottom: 20px; 
            color: var(--white);
        }
        .c-left p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        
        .info-card { 
            background: rgba(255,255,255,0.03); 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .detail-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .detail-item i { color: var(--primary); width: 20px; }
        .detail-item span { font-size: 14px; color: #ccc; }

        /* Kanan (Form) */
        .c-right { padding: 60px; background: var(--white); color: var(--dark); }
        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; font-weight: 800; font-size: 11px; 
            margin-bottom: 8px; text-transform: uppercase; color: var(--grey-text); letter-spacing: 1px; 
        }
        
        input, textarea { 
            width: 100%; padding: 15px; border: 2px solid #eee; 
            border-radius: 10px; background: #f9f9f9;
            font-family: inherit; font-size: 14px; transition: 0.3s; color: #000;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn-main { 
            width: 100%; padding: 18px; background: var(--dark); color: white; border: none; 
            border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.4s; 
            text-transform: uppercase; letter-spacing: 2px; font-size: 12px; margin-top: 10px;
        }
        .btn-main:hover { background: var(--primary); transform: translateY(-3px); }

        /* RESPONSIVE */
        @media (max-width: 992px) {
            nav { height: 90px; }
            .nav-center, .nav-right { display: none; }
            .logo-container img { height: 55px; }
            .contact-box { grid-template-columns: 1fr; border-radius: 20px; }
            .c-left, .c-right { padding: 40px; }
            .c-left h2 { font-size: 2.5rem; }
            .contact-wrap { padding-top: 130px; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="logo-container">
            <a href="index.html">
                <img src="narvexo.jpeg" alt="NARVEXO LOGO">
            </a>
        </div>

        <div class="nav-center">
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="shop.html">SHOP</a></li>
                <li><a href="contact.html" class="active">CONTACT</a></li>
            </ul>
        </div>

        <div class="nav-right"></div>
    </nav>

    <div class="contact-wrap">
        <div class="contact-box" data-aos="fade-up">
            <div class="c-left">
                <div>
                    <h2>GET IN<br>TOUCH.</h2>
                    <p>Punya pertanyaan? Tim kami siap membantu Anda secepat mungkin.</p>
                    
                    <div class="info-card">
                        <div class="detail-item">
                            <i class="fa-solid fa-location-dot"></i>
                            <span>South Jakarta, Indonesia</span>
                        </div>
                        <div class="detail-item">
                            <i class="fa-solid fa-envelope"></i>
                            <span>care@narvexo.com</span>
                        </div>
                        <div class="detail-item">
                            <i class="fa-solid fa-phone"></i>
                            <span>+62 812-3456-7890</span>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <a href="#" style="color: white; font-size: 20px;"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" style="color: white; font-size: 20px;"><i class="fa-brands fa-tiktok"></i></a>
                </div>
            </div>

            <div class="c-right">
                <form onsubmit="sendToWA(event)">
                    <div class="form-group">
                        <label>Your Full Name</label>
                        <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="contoh@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <input type="text" id="pesan" placeholder="Apa yang bisa kami bantu?" required>
                    </div>
                    <button type="submit" class="btn-main">Submit Inquiry</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        function sendToWA(event) {
            event.preventDefault();
            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const pesan = document.getElementById('pesan').value;
            const noWA = "6281234567890"; 
            const teks = `Halo Narvexo!%0A` +
                         `Ada Inquiry Baru:%0A%0A` +
                         `*Nama:* ${nama}%0A` +
                         `*Email:* ${email}%0A` +
                         `*Pesan:* ${pesan}`;
            window.open(`https://wa.me/${noWA}?text=${teks}`, '_blank');
        }

        window.addEventListener('scroll', function() {
            var nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.style.height = "90px";
            } else {
                nav.style.height = "110px";
            }
        });
    </script>
</body>
</html>
